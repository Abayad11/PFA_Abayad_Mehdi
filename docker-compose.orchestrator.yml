version: '3.8'

services:
  # LLM Orchestrator - DeepSeek R1
  llm-orchestrator:
    build: ./services/llm-orchestrator
    container_name: llm-orchestrator
    ports:
      - "8002:8002"
    environment:
      - SERVICE_PORT=8002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/abhar_sante
      - REDIS_URL=redis://redis:6379/0
      - LLM_VISION_URL=http://llm-vision:8003
      - LLM_TEXT_URL=http://llm-text:8004
      - LLM_FHIR_URL=http://llm-fhir:8005
      - LLM_RESEARCH_URL=http://llm-research:8006
    depends_on:
      - postgres
      - redis
    networks:
      - abhar-network
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # LLM Vision Service
  llm-vision:
    build: ./services/llm-vision
    container_name: llm-vision
    ports:
      - "8003:8003"
    networks:
      - abhar-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # LLM Text Service
  llm-text:
    build: ./services/llm-text
    container_name: llm-text
    ports:
      - "8004:8004"
    networks:
      - abhar-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # LLM FHIR Service
  llm-fhir:
    build: ./services/llm-fhir
    container_name: llm-fhir
    ports:
      - "8005:8005"
    networks:
      - abhar-network

  # LLM Research Service
  llm-research:
    build: ./services/llm-research
    container_name: llm-research
    ports:
      - "8006:8006"
    networks:
      - abhar-network

  # PostgreSQL avec pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-pgvector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=abhar_sante
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - abhar-network

  # Redis pour caching
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - abhar-network

networks:
  abhar-network:
    driver: bridge

volumes:
  postgres-data:
